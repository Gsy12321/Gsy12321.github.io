
# 新增：加载自定义中世纪风格CSS
extra_css:
  - stylesheets/medieval.css

# 网站基础配置
site_name: 达尔姆斯  # 调整站点名称为中世纪风格
site_description: 基于 mkdocs + GitHub Pages 打造的中世纪风格个人站点
site_author: 达尔姆斯
site_url: https://your-username.github.io/your-repo/

# 合并后的主题配置（删除重复的theme节点）
theme:
  name: material
  custom_dir: docs/overrides  # 自定义模板目录
  # 中世纪配色（深棕/暗红/暗金为主）
  palette:
    primary: brown    # 主色调：深棕色（中世纪皮革/木质质感）
    accent: amber     # 强调色：暗金色（中世纪金属/徽章质感）
  # 界面定制（保留核心功能，弱化现代感）
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  # 中世纪风格字体（替换为复古衬线字体）
  font:
    text: "MedievalSharp"       # 中世纪手写风格字体（Google Fonts）
    code: "UnifrakturMaguntia"  # 中世纪哥特风格代码字体
  # 页脚配置（中世纪版权文案）
  footer:
    copyright: "Copyright &copy; 2026 达尔姆斯 | 以剑与墨，书写传奇"

# 核心：补全导航配置（指定页面关联，恢复教程内容）
nav:
  - 首页: index.md
  - 关于我: about.md  # 明确about.md对应“关于我”
  - 教程: tutorial.md

# 扩展插件 & Markdown 增强
markdown_extensions:
  - codehilite:
      guess_lang: false
      use_pygments: true
      pygments_style: "tango"  # 替换为偏复古的代码高亮风格
  - toc:
      permalink: true
      toc_depth: 3
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

# 额外配置（中世纪风格社交图标/文案）
extra:
  social:  # 替换为中世纪风格图标（用盾牌/剑等替代现代社交图标）
    - icon: fontawesome/solid/shield-halved  # 盾牌图标（替代GitHub）
      link: https://github.com/your-username
    - icon: fontawesome/solid/pen-fancy       # 羽毛笔图标（替代知乎）
      link: https://www.zhihu.com/people/your-id
    - icon: fontawesome/solid/envelope       # 信封（保留，符合中世纪通信）
      link: mailto:your-email@example.com
  generator: false  # 隐藏现代感的MkDocs生成器标识

# 插件
plugins:
  - glightbox
  - search:
      lang: zh
  - minify:
      minify_html: true
      minify_css: true
      minify_js: true
      remove_comments: true